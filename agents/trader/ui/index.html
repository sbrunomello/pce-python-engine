<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCE Observability Console</title>
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body>
  <div class="layout">
    <aside>
      <h2>PCE Console</h2>
      <nav id="tabs"></nav>
    </aside>
    <section class="main">
      <header class="topbar">
        <div id="status"></div>
        <div class="controls">
          <button data-action="start">Start</button>
          <button data-action="stop">Stop</button>
          <button data-action="pause_decisions">Pause</button>
          <button data-action="resume_decisions">Resume</button>
          <button data-action="reset_demo">Reset</button>
        </div>
      </header>
      <main id="content"></main>
    </section>
  </div>
  <script src="/ui/app.js"></script>
</body>
</html>
